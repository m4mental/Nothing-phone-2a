name: Root Patch Nothing Phone 2a Partition Images

on:
  workflow_dispatch:
    inputs:
      superkey:
        description: 'APatch ke liye SuperKey dalein (FolkPatch aur baaki managers ke liye iski zaroorat nahi hai)'
        required: true
        default: 'Nothing2aSuperRootKey'

permissions:
  contents: write

jobs:
  patch-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl p7zip-full unzip python3

      - name: Download Stock boot and init_boot from image-boot.7z
        id: process_release
        run: |
          REPO="spike0en/nothing_archive"
          CODENAME="Pacman" # Nothing Phone (2a)
          
          # Official Archive repo se releases fetch karna
          RELEASES=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/$REPO/releases")
          
          # Latest Pacman release dhoondhna
          RELEASE_JSON=$(echo "$RELEASES" | jq --arg codename "$CODENAME" '[.[] | select(.tag_name | contains($codename))] | .[0]')
          LATEST_TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            echo "Error: Pacman release nahi mili!"
            exit 1
          fi
          
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "Found Release: $LATEST_TAG"
          
          # Description body save karna aur custom message add karna
          echo "$RELEASE_JSON" | jq -r '.body' > release_body.txt
          echo -e "\n\n---\n### 📂 Patched Partition Images (Clean Names):\nAapke Nothing Phone (2a) (Pacman) ke liye niche di gayi images is release mein generate ki gayi hain:\n\n- **\`APatch-boot.img\`** -> APatch manager se root karne ke liye is boot image ko flash karein.\n- **\`FolkPatch-boot.img\`** -> FolkPatch manager se root karne ke liye is boot image ko flash karein (FolkPatch ki SuperKey \`su\` hai).\n- **\`KernelSU-init_boot.img\`** -> Official KernelSU ke liye is init_boot image ko flash karein.\n- **\`KernelSU-Next-Normal-init_boot.img\`** -> KernelSU-Next (Normal APK) ke liye is init_boot image ko flash karein.\n- **\`KernelSU-Next-Spoof-init_boot.img\`** -> KernelSU-Next (Spoofed APK) ke liye is init_boot image ko flash karein.\n- **\`SukiSU-Ultra-init_boot.img\`** -> SukiSU-Ultra root manager ke liye is init_boot image ko flash karein.\n- **\`stock-boot.img\` / \`stock-init_boot.img\`** -> Original unmodified files (Backup ke liye)." >> release_body.txt
          
          # image-boot.7z file ka download link nikalna
          IMAGE_BOOT_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | contains("image-boot.7z")) | .browser_download_url')
          
          if [ -z "$IMAGE_BOOT_URL" ] || [ "$IMAGE_BOOT_URL" == "null" ]; then
            echo "Error: image-boot.7z asset nahi mila!"
            exit 1
          fi
          
          echo "Downloading image-boot.7z..."
          curl -L -o "image-boot.7z" "$IMAGE_BOOT_URL"
          
          echo "Extracting image-boot.7z..."
          7z x "image-boot.7z" -o"extracted_temp"
          
          # Find and copy boot.img and init_boot.img recursively to working directory
          find extracted_temp/ -type f -name "boot.img" -exec cp {} . \;
          find extracted_temp/ -type f -name "init_boot.img" -exec cp {} . \;
          
          # Verify both files are now extracted successfully
          if [ ! -f boot.img ] || [ ! -f init_boot.img ]; then
            echo "Error: boot.img ya init_boot.img extract nahi ho paya!"
            exit 1
          fi
          
          echo "boot.img and init_boot.img successfully extracted!"
          
          # Folder create karna upload ke liye aur stock files copy karna (Backup ke liye)
          mkdir assets_to_upload
          cp -f boot.img assets_to_upload/stock-boot.img
          cp -f init_boot.img assets_to_upload/stock-init_boot.img
          
          # Clean up temp files
          rm -rf extracted_temp image-boot.7z

      - name: Set up magiskboot & kptools
        run: |
          # Download magiskboot for Linux x86_64
          curl -L -o magiskboot "https://github.com/Uevo001/magiskboot-linux/raw/main/x86_64/magiskboot"
          chmod +x magiskboot
          
          # Download kptools (KernelPatch tools) and kpimg-android for APatch/FolkPatch
          KP_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/bmax121/KernelPatch/releases/latest")
          KP_TOOLS_URL=$(echo "$KP_RELEASE" | jq -r '.assets[] | select(.name | contains("kptools-linux")) | .browser_download_url')
          KP_IMG_URL=$(echo "$KP_RELEASE" | jq -r '.assets[] | select(.name | contains("kpimg-android")) | .browser_download_url')
          
          curl -L -o kptools-linux "$KP_TOOLS_URL"
          curl -L -o kpimg-android "$KP_IMG_URL"
          chmod +x kptools-linux

      - name: Fetch Latest Stable GKI Modules (.ko files) and Manager APKs
        run: |
          # 1. Official Latest Stable KernelSU Module & APK URL
          KSU_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/tiann/KernelSU/releases/latest")
          KSU_KO_URL=$(echo "$KSU_RELEASE" | jq -r '.assets[] | select(.name | contains("android14-5.15_kernelsu.ko")) | .browser_download_url')
          KSU_APK_URL=$(echo "$KSU_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          curl -L -o kernelsu-official.ko "$KSU_KO_URL"
          
          # 2. Latest Stable KernelSU-Next Module & APK URLs (Normal & Spoof)
          KSUN_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest")
          KSUN_KO_URL=$(echo "$KSUN_RELEASE" | jq -r '.assets[] | select(.name == "android14-5.15_kernelsu.ko") | .browser_download_url')
          curl -L -o kernelsu-next.ko "$KSUN_KO_URL"
          
          KSUN_APK_NORMAL=$(echo "$KSUN_RELEASE" | jq -r '.assets[] | select(.name | contains("release.apk") and (contains("spoofed") | not)) | .browser_download_url' | head -n 1)
          KSUN_APK_SPOOF=$(echo "$KSUN_RELEASE" | jq -r '.assets[] | select(.name | contains("spoofed") and contains(".apk")) | .browser_download_url' | head -n 1)
          if [ -z "$KSUN_APK_NORMAL" ] || [ "$KSUN_APK_NORMAL" == "null" ]; then
            KSUN_APK_NORMAL=$(echo "$KSUN_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk") and (contains("spoofed") | not)) | .browser_download_url' | head -n 1)
          fi
          
          # Spoofed GKI Module ko extract karna (Spoofed APK ke assets se extraction)
          if [ ! -z "$KSUN_APK_SPOOF" ] && [ "$KSUN_APK_SPOOF" != "null" ]; then
            echo "Downloading spoofed APK to extract spoofed .ko module..."
            curl -L -o ksun-spoofed.apk "$KSUN_APK_SPOOF"
            unzip -o ksun-spoofed.apk -d ksun_spoofed_unzipped
            
            # Unzip kiye gaye spoofed apk se 5.15 module dhoondhna
            SPOOF_KO_PATH=$(find ksun_spoofed_unzipped/ -type f -name "*5.15_kernelsu.ko" -o -name "*5.15*.ko" | head -n 1)
            if [ ! -z "$SPOOF_KO_PATH" ]; then
              cp "$SPOOF_KO_PATH" kernelsu-next-spoof.ko
              echo "Successfully extracted spoofed .ko module: $SPOOF_KO_PATH"
            else
              echo "Warning: Spoofed ko not found in APK, using fallback."
              cp kernelsu-next.ko kernelsu-next-spoof.ko
            fi
            rm -rf ksun_spoofed_unzipped ksun-spoofed.apk
          else
            echo "Warning: Spoofed APK URL empty, fallback used."
            cp kernelsu-next.ko kernelsu-next-spoof.ko
          fi
          
          # 3. Latest Stable SukiSU-Ultra Module & APK URL
          SUKI_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/releases/latest")
          SUKI_KO_URL=$(echo "$SUKI_RELEASE" | jq -r '.assets[] | select(.name | contains("android14-5.15_kernelsu.ko")) | .browser_download_url')
          SUKI_APK_URL=$(echo "$SUKI_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          if [ ! -z "$SUKI_KO_URL" ] && [ "$SUKI_KO_URL" != "null" ]; then
            curl -L -o sukisu-ultra.ko "$SUKI_KO_URL"
          else
            echo "SukiSU-Ultra GKI module not found in official assets, fallback to stable kernelsu-official."
            cp kernelsu-official.ko sukisu-ultra.ko
          fi
          
          # 4. Fetch Latest Stable APatch APK URL
          APA_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/bmax121/APatch/releases/latest")
          APA_APK_URL=$(echo "$APA_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          
          # 5. Fetch Latest Stable FolkPatch APK URL
          FOLK_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/LyraVoid/FolkPatch/releases/latest")
          FOLK_APK_URL=$(echo "$FOLK_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          
          # Safe fallback links agar koi query empty ya null return kare
          if [ -z "$KSU_APK_URL" ] || [ "$KSU_APK_URL" == "null" ]; then KSU_APK_URL="https://github.com/tiann/KernelSU/releases"; fi
          if [ -z "$KSUN_APK_NORMAL" ] || [ "$KSUN_APK_NORMAL" == "null" ]; then KSUN_APK_NORMAL="https://github.com/KernelSU-Next/KernelSU-Next/releases"; fi
          if [ -z "$KSUN_APK_SPOOF" ] || [ "$KSUN_APK_SPOOF" == "null" ]; then KSUN_APK_SPOOF="https://github.com/KernelSU-Next/KernelSU-Next/releases"; fi
          if [ -z "$SUKI_APK_URL" ] || [ "$SUKI_APK_URL" == "null" ]; then SUKI_APK_URL="https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases"; fi
          if [ -z "$APA_APK_URL" ] || [ "$APA_APK_URL" == "null" ]; then APA_APK_URL="https://github.com/bmax121/APatch/releases"; fi
          if [ -z "$FOLK_APK_URL" ] || [ "$FOLK_APK_URL" == "null" ]; then FOLK_APK_URL="https://github.com/LyraVoid/FolkPatch/releases"; fi
          
          # Release description mein direct stable APK ke links write karna
          echo -e "\n\n---\n### 📥 Direct Download Links for Root Manager APKs (Latest Stable):\nPatched images ko perfect compatible state mein chalane ke liye, niche diye gaye official links se latest stable manager APK file download karke install karein:\n\n1. 🌟 **KernelSU Manager:**\n   - [Download KernelSU APK]($KSU_APK_URL)\n\n2. 🌟 **KernelSU-Next Manager:**\n   - [Download Normal APK]($KSUN_APK_NORMAL)\n   - [Download Spoofed APK (SUSFS/Spoof)]($KSUN_APK_SPOOF)\n\n3. 🌟 **APatch Manager:**\n   - [Download APatch APK]($APA_APK_URL)\n\n4. 🌟 **FolkPatch Manager:**\n   - [Download FolkPatch APK]($FOLK_APK_URL)\n\n5. 🌟 **SukiSU-Ultra Manager:**\n   - [Download SukiSU-Ultra APK]($SUKI_APK_URL)" >> release_body.txt

      - name: Patch boot.img (APatch, FolkPatch)
        run: |
          # 1. APatch
          ./kptools-linux unpack boot.img
          mv kernel kernel-b
          ./kptools-linux -p --image kernel-b --skey "${{ github.event.inputs.superkey }}" --kpimg kpimg-android --out kernel
          ./kptools-linux repack boot.img
          mv new-boot.img assets_to_upload/APatch-boot.img
          rm -f kernel-b kernel ramdisk.cpio new-boot.img
          
          # 2. FolkPatch
          ./kptools-linux unpack boot.img
          mv kernel kernel-b
          ./kptools-linux -p --image kernel-b --skey "su" --kpimg kpimg-android --out kernel
          ./kptools-linux repack boot.img
          mv new-boot.img assets_to_upload/FolkPatch-boot.img
          rm -f kernel-b kernel ramdisk.cpio new-boot.img

      - name: Patch init_boot.img via LKM Ramdisk Injection
        run: |
          # Helper function for LKM patching
          patch_init_boot_lkm() {
            local ko_file=$1
            local output_name=$2
            
            echo "Patching init_boot.img with $ko_file..."
            ./magiskboot unpack init_boot.img
            
            mkdir -p rd
            cd rd
            cpio -idmv < ../ramdisk.cpio
            
            # Module ko copy karna
            mkdir -p lib/modules
            cp -f ../$ko_file lib/modules/kernelsu.ko
            
            # early-init block mein insmod entry insert karna
            if [ -f init.rc ]; then
              sed -i 's/on early-init/on early-init\n    insmod \/lib\/modules\/kernelsu.ko/g' init.rc
            else
              echo "on early-init" >> init.rc
              echo "    insmod /lib/modules/kernelsu.ko" >> init.rc
            fi
            
            # Repack ramdisk
            find . | cpio -o -H newc > ../ramdisk.cpio
            cd ..
            rm -rf rd
            
            # Repack init_boot
            ./magiskboot repack init_boot.img
            mv new-boot.img assets_to_upload/$output_name
            ./magiskboot cleanup
          }
          
          # 3. KernelSU (Official) init_boot patching
          patch_init_boot_lkm kernelsu-official.ko "KernelSU-init_boot.img"
          
          # 4. KernelSU-Next (Normal APK Manager ke liye)
          patch_init_boot_lkm kernelsu-next.ko "KernelSU-Next-Normal-init_boot.img"
          
          # 5. KernelSU-Next (Spoofed APK Manager ke liye)
          patch_init_boot_lkm kernelsu-next-spoof.ko "KernelSU-Next-Spoof-init_boot.img"
          
          # 6. SukiSU-Ultra init_boot patching
          patch_init_boot_lkm sukisu-ultra.ko "SukiSU-Ultra-init_boot.img"

      - name: Create Release and Upload Patched Partition Images
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.LATEST_TAG }}
          name: ${{ env.LATEST_TAG }}
          body_path: release_body.txt
          files: assets_to_upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
