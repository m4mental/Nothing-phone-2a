name: Mirror All Nothing Phone 2a Assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Fetch and Process Release
        id: process_release
        run: |
          REPO="spike0en/nothing_archive"
          CODENAME="Pacman"
          
          # Source repo se releases fetch karna
          RELEASES=$(curl -s "https://api.github.com/repos/$REPO/releases")
          
          # Latest Pacman release dhoondhna
          RELEASE_JSON=$(echo "$RELEASES" | jq --arg codename "$CODENAME" '[.[] | select(.tag_name | contains($codename))] | .[0]')
          
          LATEST_TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            echo "Error: Pacman release nahi mili!"
            exit 1
          fi
          
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "Found Release: $LATEST_TAG"
          
          # Original description (body) extract karna jisme official OTA ke download links hain
          echo "$RELEASE_JSON" | jq -r '.body' > release_body.txt
          
          # Aapke liye simple text instructions description ke niche append (add) karna
          echo -e "\n\n---\n### 📢 OTA Update Information (Hinglish Guide):\n- **Kaun sa OTA Incremental hai?**\n  Upar description mein arrow (\`->\`) ke right side (daayein) likha hua version aapka **Incremental OTA** hai.\n- **Download Link:**\n  Upar blue color ke text par click karke aap direct OTA zip download kar sakte hain. Arrow (\`->\`) ke right side wala link hi aapke incremental ota ka official download link hai." >> release_body.txt
          
          # Folder banakar saari files (logical, boot, firmware, sha256) download karna
          mkdir assets_to_upload
          echo "$RELEASE_JSON" | jq -c '.assets[]' | while read -r asset; do
            ASSET_URL=$(echo "$asset" | jq -r '.browser_download_url')
            ASSET_NAME=$(echo "$asset" | jq -r '.name')
            echo "Downloading $ASSET_NAME..."
            curl -L -o "assets_to_upload/$ASSET_NAME" "$ASSET_URL"
          done

      - name: Create Release and Upload All Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.LATEST_TAG }}
          name: ${{ env.LATEST_TAG }}
          body_path: release_body.txt
          files: assets_to_upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
