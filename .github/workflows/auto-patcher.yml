      - name: Update and Commit Tracked Versions & README to Repository
        if: env.ANY_BUILD == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # checkout correct branch explicitly to prevent detached HEAD
          git checkout ${{ github.ref_name }}
          
          # Write new versions back to versions.json
          echo "{\"nothing_tag\":\"${{ env.NEW_NOTHING }}\",\"ksu_version\":\"${{ env.NEW_KSU }}\",\"ksun_version\":\"${{ env.NEW_KSUN }}\",\"sukisu_version\":\"${{ env.NEW_SUKI }}\"}" > versions.json
          
          # Stage files before pulling/rebasing to avoid unstaged conflict
          git add versions.json README.md
          git commit -m "Auto-update tracked versions & README [skip ci]" || echo "No changes to commit"
          
          # pull changes before pushing to avoid conflicts
          git pull origin ${{ github.ref_name }} --rebase
          
          # Push to branch
          git push origin ${{ github.ref_name }}
