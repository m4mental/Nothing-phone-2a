name: Automatic Root Patcher (Autopilot)

on:
  schedule:
    - cron: '0 */12 * * *' # Har 12 ghante mein automatic background mein check karega
  workflow_dispatch: # Manual ek click par run karne ke liye bhi option rahega
    inputs:
      superkey:
        description: 'APatch ke liye SuperKey dalein'
        required: true
        default: 'root@123' # Default password is now root@123

permissions:
  contents: write # Required to write commits and create releases

jobs:
  check-and-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full git history fetch karna push safety ke liye

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl p7zip-full unzip python3

      - name: Check and Compare Versions
        id: check_versions
        run: |
          # 1. Read existing versions.json or set defaults if not exists
          if [ ! -f versions.json ]; then
            echo '{"nothing_tag":"","ksu_version":"","ksun_version":"","sukisu_version":"","apatch_version":"","folkpatch_version":""}' > versions.json
          fi
          
          OLD_NOTHING=$(jq -r '.nothing_tag' versions.json)
          OLD_KSU=$(jq -r '.ksu_version' versions.json)
          OLD_KSUN=$(jq -r '.ksun_version' versions.json)
          OLD_SUKI=$(jq -r '.sukisu_version' versions.json)
          OLD_APA=$(jq -r '.apatch_version' versions.json)
          OLD_FOLK=$(jq -r '.folkpatch_version' versions.json)
          
          # 2. Fetch latest versions from official APIs
          REPO="spike0en/nothing_archive"
          CODENAME="Pacman"
          RELEASES=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/$REPO/releases")
          RELEASE_JSON=$(echo "$RELEASES" | jq --arg codename "$CODENAME" '[.[] | select(.tag_name | contains($codename))] | .[0]')
          NEW_NOTHING=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          
          NEW_KSU=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/tiann/KernelSU/releases/latest" | jq -r '.tag_name')
          NEW_KSUN=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest" | jq -r '.tag_name')
          NEW_SUKI=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/releases/latest" | jq -r '.tag_name')
          NEW_APA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/bmax121/APatch/releases/latest" | jq -r '.tag_name')
          NEW_FOLK=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/LyraVoid/FolkPatch/releases/latest" | jq -r '.tag_name')
          
          # 3. Determine what needs to be built
          BUILD_STOCK=false
          BUILD_KSU=false
          BUILD_KSUN=false
          BUILD_SUKI=false
          BUILD_APA=false
          BUILD_FOLK=false
          
          # Check automatic update logic
          if [ "$NEW_NOTHING" != "$OLD_NOTHING" ]; then
            echo "Nothing OS update detected! Full rebuild triggered."
            BUILD_STOCK=true
            BUILD_KSU=true
            BUILD_KSUN=true
            BUILD_SUKI=true
            BUILD_APA=true
            BUILD_FOLK=true
          else
            if [ "$NEW_KSU" != "$OLD_KSU" ]; then BUILD_KSU=true; fi
            if [ "$NEW_KSUN" != "$OLD_KSUN" ]; then BUILD_KSUN=true; fi
            if [ "$NEW_SUKI" != "$OLD_SUKI" ]; then BUILD_SUKI=true; fi
            if [ "$NEW_APA" != "$OLD_APA" ]; then BUILD_APA=true; fi
            if [ "$NEW_FOLK" != "$OLD_FOLK" ]; then BUILD_FOLK=true; fi
          fi
          
          # FORCE TRIGGER IF MANUALLY RUN (Crucial for first run/updates)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run detected! Force-enabling all builds and README updates."
            BUILD_STOCK=true
            BUILD_KSU=true
            BUILD_KSUN=true
            BUILD_SUKI=true
            BUILD_APA=true
            BUILD_FOLK=true
          fi
          
          if [ "$BUILD_STOCK" = "true" ] || [ "$BUILD_KSU" = "true" ] || [ "$BUILD_KSUN" = "true" ] || [ "$BUILD_SUKI" = "true" ] || [ "$BUILD_APA" = "true" ] || [ "$BUILD_FOLK" = "true" ]; then
            ANY_BUILD=true
          else
            ANY_BUILD=false
          fi
          
          # Export to env
          echo "ANY_BUILD=$ANY_BUILD" >> $GITHUB_ENV
          echo "BUILD_STOCK=$BUILD_STOCK" >> $GITHUB_ENV
          echo "BUILD_KSU=$BUILD_KSU" >> $GITHUB_ENV
          echo "BUILD_KSUN=$BUILD_KSUN" >> $GITHUB_ENV
          echo "BUILD_SUKI=$BUILD_SUKI" >> $GITHUB_ENV
          echo "BUILD_APA=$BUILD_APA" >> $GITHUB_ENV
          echo "BUILD_FOLK=$BUILD_FOLK" >> $GITHUB_ENV
          
          echo "NEW_NOTHING=$NEW_NOTHING" >> $GITHUB_ENV
          echo "NEW_KSU=$NEW_KSU" >> $GITHUB_ENV
          echo "NEW_KSUN=$NEW_KSUN" >> $GITHUB_ENV
          echo "NEW_SUKI=$NEW_SUKI" >> $GITHUB_ENV
          echo "NEW_APA=$NEW_APA" >> $GITHUB_ENV
          echo "NEW_FOLK=$NEW_FOLK" >> $GITHUB_ENV
          
          echo "$RELEASE_JSON" | jq -r '.body' > base_body.txt

      - name: Download Stock boot and init_boot from image-boot.7z
        if: env.ANY_BUILD == 'true'
        run: |
          REPO="spike0en/nothing_archive"
          CODENAME="Pacman"
          RELEASES=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/$REPO/releases")
          RELEASE_JSON=$(echo "$RELEASES" | jq --arg codename "$CODENAME" '[.[] | select(.tag_name | contains($codename))] | .[0]')
          IMAGE_BOOT_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | contains("image-boot.7z")) | .browser_download_url')
          
          echo "Downloading image-boot.7z..."
          curl -L -o "image-boot.7z" "$IMAGE_BOOT_URL"
          7z x "image-boot.7z" -o"extracted_temp"
          find extracted_temp/ -type f -name "boot.img" -exec cp {} . \;
          find extracted_temp/ -type f -name "init_boot.img" -exec cp {} . \;
          cp -f boot.img stock-boot.img
          cp -f init_boot.img stock-init_boot.img
          rm -rf extracted_temp image-boot.7z
          
          if [ "${{ env.BUILD_STOCK }}" = "true" ]; then
            mkdir -p stock_assets
            echo "$RELEASE_JSON" | jq -c '.assets[]' | while read -r asset; do
              ASSET_URL=$(echo "$asset" | jq -r '.browser_download_url')
              ASSET_NAME=$(echo "$asset" | jq -r '.name')
              curl -L -o "stock_assets/$ASSET_NAME" "$ASSET_URL"
            done
          fi

      - name: Set up magiskboot, kptools & ksud
        if: env.ANY_BUILD == 'true'
        run: |
          # 1. Setup magiskboot
          curl -L -o magiskboot "https://github.com/Uevo001/magiskboot-linux/raw/main/x86_64/magiskboot"
          chmod +x magiskboot
          
          # 2. Setup kptools with robust fallbacks
          KP_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/bmax121/KernelPatch/releases/latest")
          KP_TOOLS_URL=$(echo "$KP_RELEASE" | jq -r '.assets[] | select(.name == "kptools-linux") | .browser_download_url' | head -n 1)
          KP_IMG_URL=$(echo "$KP_RELEASE" | jq -r '.assets[] | select(.name == "kpimg-android") | .browser_download_url' | head -n 1)
          
          if [ -z "$KP_TOOLS_URL" ] || [ "$KP_TOOLS_URL" == "null" ]; then
            echo "Warning: Could not fetch kptools-linux dynamically, using fallback."
            KP_TOOLS_URL="https://github.com/bmax121/KernelPatch/releases/download/0.10.14/kptools-linux"
          fi
          if [ -z "$KP_IMG_URL" ] || [ "$KP_IMG_URL" == "null" ]; then
            echo "Warning: Could not fetch kpimg-android dynamically, using fallback."
            KP_IMG_URL="https://github.com/bmax121/KernelPatch/releases/download/0.10.14/kpimg-android"
          fi
          
          curl -L -o kptools-linux "$KP_TOOLS_URL"
          curl -L -o kpimg-android "$KP_IMG_URL"
          chmod +x kptools-linux

          # 3. Setup official ksud with robust Fede2782/KernelSU stable fallback
          FEDE_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/Fede2782/KernelSU/releases/latest")
          KSUD_URL=$(echo "$FEDE_RELEASE" | jq -r '.assets[] | select(.name | contains("ksud-x86_64-unknown-linux-musl")) | .browser_download_url' | head -n 1)
          
          if [ -z "$KSUD_URL" ] || [ "$KSUD_URL" == "null" ]; then
            echo "Warning: Could not fetch ksud dynamically, using stable fallback."
            KSUD_URL="https://github.com/Fede2782/KernelSU/releases/download/v1.0.5-legacy3/ksud-x86_64-unknown-linux-musl"
          fi
          
          curl -L -o ksud "$KSUD_URL"
          chmod +x ksud

      - name: Fetch Latest Stable GKI Modules and APKs
        if: env.ANY_BUILD == 'true'
        run: |
          # 1. Official Latest Stable KernelSU Module & APK URL
          KSU_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/tiann/KernelSU/releases/latest")
          KSU_KO_URL=$(echo "$KSU_RELEASE" | jq -r '.assets[] | select(.name | contains("android14-5.15_kernelsu.ko")) | .browser_download_url')
          KSU_APK_URL=$(echo "$KSU_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          curl -L -o kernelsu-official.ko "$KSU_KO_URL"
          
          # 2. Latest Stable KernelSU-Next (Normal & Spoof)
          KSUN_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest")
          KSUN_KO_URL=$(echo "$KSUN_RELEASE" | jq -r '.assets[] | select(.name == "android14-5.15_kernelsu.ko") | .browser_download_url')
          curl -L -o kernelsu-next.ko "$KSUN_KO_URL"
          
          KSUN_APK_NORMAL=$(echo "$KSUN_RELEASE" | jq -r '.assets[] | select(.name | contains("release.apk") and (contains("spoofed") | not)) | .browser_download_url' | head -n 1)
          KSUN_APK_SPOOF=$(echo "$KSUN_RELEASE" | jq -r '.assets[] | select(.name | contains("spoofed") and contains(".apk")) | .browser_download_url' | head -n 1)
          
          # Spoofed GKI Module Extraction from Spoofed APK
          if [ ! -z "$KSUN_APK_SPOOF" ] && [ "$KSUN_APK_SPOOF" != "null" ]; then
            curl -L -o ksun-spoofed.apk "$KSUN_APK_SPOOF"
            unzip -o ksun-spoofed.apk -d ksun_spoofed_unzipped
            SPOOF_KO_PATH=$(find ksun_spoofed_unzipped/ -type f -name "*5.15_kernelsu.ko" -o -name "*5.15*.ko" | head -n 1)
            if [ ! -z "$SPOOF_KO_PATH" ]; then
              cp "$SPOOF_KO_PATH" kernelsu-next-spoof.ko
            else
              cp kernelsu-next.ko kernelsu-next-spoof.ko
            fi
            rm -rf ksun_spoofed_unzipped ksun-spoofed.apk
          else
            cp kernelsu-next.ko kernelsu-next-spoof.ko
          fi
          
          # 3. SukiSU-Ultra Module & APK URL
          SUKI_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/releases/latest")
          SUKI_KO_URL=$(echo "$SUKI_RELEASE" | jq -r '.assets[] | select(.name | contains("android14-5.15_kernelsu.ko")) | .browser_download_url')
          SUKI_APK_URL=$(echo "$SUKI_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          if [ ! -z "$SUKI_KO_URL" ] && [ "$SUKI_KO_URL" != "null" ]; then
            curl -L -o sukisu-ultra.ko "$SUKI_KO_URL"
          else
            cp kernelsu-official.ko sukisu-ultra.ko
          fi
          
          # 4. Fetch APatch APK URL
          APA_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/bmax121/APatch/releases/latest")
          APA_APK_URL=$(echo "$APA_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          
          # 5. Fetch FolkPatch APK URL
          FOLK_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/LyraVoid/FolkPatch/releases/latest")
          FOLK_APK_URL=$(echo "$FOLK_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          
          # Fallbacks
          if [ -z "$KSU_APK_URL" ] || [ "$KSU_APK_URL" == "null" ]; then KSU_APK_URL="https://github.com/tiann/KernelSU/releases"; fi
          if [ -z "$KSUN_APK_NORMAL" ] || [ "$KSUN_APK_NORMAL" == "null" ]; then KSUN_APK_NORMAL="https://github.com/KernelSU-Next/KernelSU-Next/releases"; fi
          if [ -z "$KSUN_APK_SPOOF" ] || [ "$KSUN_APK_SPOOF" == "null" ]; then KSUN_APK_SPOOF="https://github.com/KernelSU-Next/KernelSU-Next/releases"; fi
          if [ -z "$SUKI_APK_URL" ] || [ "$SUKI_APK_URL" == "null" ]; then SUKI_APK_URL="https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases"; fi
          if [ -z "$APA_APK_URL" ] || [ "$APA_APK_URL" == "null" ]; then APA_APK_URL="https://github.com/bmax121/APatch/releases"; fi
          if [ -z "$FOLK_APK_URL" ] || [ "$FOLK_APK_URL" == "null" ]; then FOLK_APK_URL="https://github.com/LyraVoid/FolkPatch/releases"; fi
          
          # Create description files
          cp base_body.txt desc_stock.txt
          echo -e "\n\n---\n### 🔄 How to OTA Update Safely (Anti-Bootloop Method):\nIf your device is rooted, do not install updates directly without restoring stock images. For step-by-step flashing instructions and official system (OTA) update guides, please refer to our [Official Guide](https://github.com/${{ github.repository }}/blob/main/GUIDE.md).\n\n**Quick Summary for Rooted Users:**\n1. Install the system update normally via phone Settings.\n2. Let the device reboot (root will be temporarily lost, which is normal and safe).\n3. Go to our Releases page, download the newly generated patched images matching the new version, and flash them via Fastboot to restore root safely!" >> desc_stock.txt

          cp base_body.txt desc_apatch.txt
          echo -e "\n\n---\n### ℹ️ Build Information:\n- **Nothing OS Build Version Patched:** \`${{ env.NEW_NOTHING }}\`\n\n### 📖 Flashing & Update Guide:\n- For complete step-by-step flashing instructions and safe OTA update methods, please refer to the [Official Guide](https://github.com/${{ github.repository }}/blob/main/GUIDE.md).\n\n### 🛡️ APatch Patched Boot Image:\n- **APatch SuperKey:** \`${{ github.event.inputs.superkey }}\` (Use this SuperKey/password inside the APatch app to grant root access).\n- **File to Flash:** \`APatch-boot.img\`\n- **Backup File:** \`stock-boot.img\`\n\n### 📥 Direct Download Link:\n- [Download APatch APK]($APA_APK_URL)" >> desc_apatch.txt
          
          cp base_body.txt desc_folkpatch.txt
          echo -e "\n\n---\n### ℹ️ Build Information:\n- **Nothing OS Build Version Patched:** \`${{ env.NEW_NOTHING }}\`\n\n### 📖 Flashing & Update Guide:\n- For complete step-by-step flashing instructions and safe OTA update methods, please refer to the [Official Guide](https://github.com/${{ github.repository }}/blob/main/GUIDE.md).\n\n### 🛡️ FolkPatch Patched Boot Image:\n- **FolkPatch SuperKey:** Default (\`su\`)\n- **File to Flash:** \`FolkPatch-boot.img\`\n- **Backup File:** \`stock-boot.img\`\n\n### 📥 Direct Download Link:\n- [Download FolkPatch APK]($FOLK_APK_URL)" >> desc_folkpatch.txt
          
          cp base_body.txt desc_ksu.txt
          echo -e "\n\n---\n### ℹ️ Build Information:\n- **Nothing OS Build Version Patched:** \`${{ env.NEW_NOTHING }}\`\n\n### 📖 Flashing & Update Guide:\n- For complete step-by-step flashing instructions and safe OTA update methods, please refer to the [Official Guide](https://github.com/${{ github.repository }}/blob/main/GUIDE.md).\n\n### 🛡️ KernelSU Patched Init_Boot Image (LKM GKI2 Mode):\n- **File to Flash:** \`KernelSU-init_boot.img\`\n- **Backup File:** \`stock-init_boot.img\`\n\n### 📥 Direct Download Link:\n- [Download KernelSU APK]($KSU_APK_URL)" >> desc_ksu.txt
          
          cp base_body.txt desc_ksun.txt
          echo -e "\n\n---\n### ℹ️ Build Information:\n- **Nothing OS Build Version Patched:** \`${{ env.NEW_NOTHING }}\`\n\n### 📖 Flashing & Update Guide:\n- For complete step-by-step flashing instructions and safe OTA update methods, please refer to the [Official Guide](https://github.com/${{ github.repository }}/blob/main/GUIDE.md).\n\n### 🛡️ KernelSU-Next Patched Init_Boot Images (LKM GKI2 Mode):\n- **Files to Flash:** \`KernelSU-Next-Normal-init_boot.img\` ya \`KernelSU-Next-Spoof-init_boot.img\`\n- **Backup File:** \`stock-init_boot.img\`\n\n### 📥 Direct Download Links:\n- [Download Normal APK]($KSUN_APK_NORMAL)\n- [Download Spoofed APK (SUSFS/Spoof)]($KSUN_APK_SPOOF)" >> desc_ksun.txt
          
          cp base_body.txt desc_suki.txt
          echo -e "\n\n---\n### ℹ️ Build Information:\n- **Nothing OS Build Version Patched:** \`${{ env.NEW_NOTHING }}\`\n\n### 📖 Flashing & Update Guide:\n- For complete step-by-step flashing instructions and safe OTA update methods, please refer to the [Official Guide](https://github.com/${{ github.repository }}/blob/main/GUIDE.md).\n\n### 🛡️ SukiSU-Ultra Patched Init_Boot Image (LKM GKI2 Mode):\n- **File to Flash:** \`SukiSU-Ultra-init_boot.img\`\n- **Backup File:** \`stock-init_boot.img\`\n\n### 📥 Direct Download Link:\n- [Download SukiSU-Ultra APK]($SUKI_APK_URL)" >> desc_suki.txt

          # Save APK URLs to Env for README generator
          echo "KSU_APK_URL=$KSU_APK_URL" >> $GITHUB_ENV
          echo "KSUN_APK_NORMAL=$KSUN_APK_NORMAL" >> $GITHUB_ENV
          echo "KSUN_APK_SPOOF=$KSUN_APK_SPOOF" >> $GITHUB_ENV
          echo "SUKI_APK_URL=$SUKI_APK_URL" >> $GITHUB_ENV
          echo "APA_APK_URL=$APA_APK_URL" >> $GITHUB_ENV
          echo "FOLK_APK_URL=$FOLK_APK_URL" >> $GITHUB_ENV

      - name: Patch boot.img for APatch
        if: env.BUILD_APA == 'true'
        run: |
          ./kptools-linux unpack boot.img
          mv kernel kernel-b
          ./kptools-linux -p --image kernel-b --skey "${{ github.event.inputs.superkey }}" --kpimg kpimg-android --out kernel
          ./kptools-linux repack boot.img
          mv new-boot.img APatch-boot.img
          rm -f kernel-b kernel ramdisk.cpio new-boot.img

      - name: Patch boot.img for FolkPatch
        if: env.BUILD_FOLK == 'true'
        run: |
          ./kptools-linux unpack boot.img
          mv kernel kernel-b
          ./kptools-linux -p --image kernel-b --skey "su" --kpimg kpimg-android --out kernel
          ./kptools-linux repack boot.img
          mv new-boot.img FolkPatch-boot.img
          rm -f kernel-b kernel ramdisk.cpio new-boot.img

      - name: Patch init_boot.img via ksud Boot-Patch (KernelSU, KernelSU-Next, SukiSU-Ultra)
        if: env.ANY_BUILD == 'true'
        run: |
          # Patch images using official ksud binary using ABSOLUTE PATHS to prevent (os error 2)
          # We pass output file path directly to -o/--out option in ksud v1
          if [ "${{ env.BUILD_KSU }}" = "true" ]; then
            ./ksud boot-patch -b "$(pwd)/init_boot.img" -m "$(pwd)/kernelsu-official.ko" --magiskboot "$(pwd)/magiskboot" --kmi android14-5.15 -o "$(pwd)/KernelSU-init_boot.img"
          fi
          
          if [ "${{ env.BUILD_KSUN }}" = "true" ]; then
            ./ksud boot-patch -b "$(pwd)/init_boot.img" -m "$(pwd)/kernelsu-next.ko" --magiskboot "$(pwd)/magiskboot" --kmi android14-5.15 -o "$(pwd)/KernelSU-Next-Normal-init_boot.img"
            ./ksud boot-patch -b "$(pwd)/init_boot.img" -m "$(pwd)/kernelsu-next-spoof.ko" --magiskboot "$(pwd)/magiskboot" --kmi android14-5.15 -o "$(pwd)/KernelSU-Next-Spoof-init_boot.img"
          fi
          
          if [ "${{ env.BUILD_SUKI }}" = "true" ]; then
            ./ksud boot-patch -b "$(pwd)/init_boot.img" -m "$(pwd)/sukisu-ultra.ko" --magiskboot "$(pwd)/magiskboot" --kmi android14-5.15 -o "$(pwd)/SukiSU-Ultra-init_boot.img"
          fi

      # ----------------------------------------------------
      # Releases uploads conditionally with clean tag names
      # ----------------------------------------------------
      - name: Create Stock Update Release
        if: env.BUILD_STOCK == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_NOTHING }}
          name: ${{ env.NEW_NOTHING }}
          body_path: desc_stock.txt
          files: stock_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create APatch Release
        if: env.BUILD_APA == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: APatch-${{ env.NEW_APA }}
          name: APatch (${{ env.NEW_APA }})
          body_path: desc_apatch.txt
          files: |
            APatch-boot.img
            stock-boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create FolkPatch Release
        if: env.BUILD_FOLK == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: FolkPatch-${{ env.NEW_FOLK }}
          name: FolkPatch (${{ env.NEW_FOLK }})
          body_path: desc_folkpatch.txt
          files: |
            FolkPatch-boot.img
            stock-boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create KernelSU Release
        if: env.BUILD_KSU == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: KernelSU-${{ env.NEW_KSU }}
          name: KernelSU (${{ env.NEW_KSU }})
          body_path: desc_ksu.txt
          files: |
            KernelSU-init_boot.img
            stock-init_boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create KernelSU-Next Release
        if: env.BUILD_KSUN == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: KernelSU-Next-${{ env.NEW_KSUN }}
          name: KernelSU-Next (${{ env.NEW_KSUN }})
          body_path: desc_ksun.txt
          files: |
            KernelSU-Next-Normal-init_boot.img
            KernelSU-Next-Spoof-init_boot.img
            stock-init_boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create SukiSU-Ultra Release
        if: env.BUILD_SUKI == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: SukiSU-Ultra-${{ env.NEW_SUKI }}
          name: SukiSU-Ultra (${{ env.NEW_SUKI }})
          body_path: desc_suki.txt
          files: |
            SukiSU-Ultra-init_boot.img
            stock-init_boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Dynamic README.md
        if: env.ANY_BUILD == 'true'
        run: |
          # Get current date in IST timezone (Asia/Kolkata)
          CURR_DATE=$(TZ="Asia/Kolkata" date +"%d %b %Y, %I:%M %p %Z")
          
          # Construct precise release URLs using newest tags
          URL_STOCK="https://github.com/${{ github.repository }}/releases/tag/${{ env.NEW_NOTHING }}"
          URL_APA="https://github.com/${{ github.repository }}/releases/tag/APatch-${{ env.NEW_APA }}"
          URL_FOLK="https://github.com/${{ github.repository }}/releases/tag/FolkPatch-${{ env.NEW_FOLK }}"
          URL_KSU="https://github.com/${{ github.repository }}/releases/tag/KernelSU-${{ env.NEW_KSU }}"
          URL_KSUN="https://github.com/${{ github.repository }}/releases/tag/KernelSU-Next-${{ env.NEW_KSUN }}"
          URL_SUKI="https://github.com/${{ github.repository }}/releases/tag/SukiSU-Ultra-${{ env.NEW_SUKI }}"
          
          # Generate clean README markdown
          cat << EOF > README.md
          # Nothing Phone (2a) - Autopilot Root Patcher Hub 🛡️

          Welcome to your personal automatic rooting hub! This repository automatically tracks, downloads, patches, and publishes stock and rooted partition images for **Nothing Phone (2a) (Pacman)** on every new update.

          ---

          ## 📖 Step-by-Step Guides (Fastboot Flashing & OTA Updates)
          Learn how to root your device via fastboot and how to safely install official system updates (OTA) without losing data:
          *   👉 **[Click here to read the Complete Root & OTA Flashing Guide](https://github.com/${{ github.repository }}/blob/main/GUIDE.md)**

          ---

          ## 📥 Quick Download Navigation (Latest Releases)
          Select the appropriate download for your phone by clicking the links below:

          ### 📱 Stock Update (No Root)
          If you want to update your phone with official/original stock images (firmware, logical, boot, etc.) without root, click here:
          *   👉 **[Go to Latest Stock Update Release]($URL_STOCK)**

          ---

          ### 🔑 Patched Boot Images (APatch & FolkPatch)
          Click below to download patched boot images for APatch and FolkPatch:
          *   👉 **[Download Latest APatch Patched Boot]($URL_APA)**
          *   👉 **[Download Latest FolkPatch Patched Boot]($URL_FOLK)**

          ---

          ### 🧬 Patched Init_Boot Images (KernelSU, KernelSU-Next, SukiSU-Ultra)
          Click below to download patched init_boot images for KernelSU and compatible modules (LKM GKI2 mode):
          *   👉 **[Download Latest KernelSU Patched Init_Boot]($URL_KSU)**
          *   👉 **[Download Latest KernelSU-Next Patched Init_Boot]($URL_KSUN)**
          *   👉 **[Download Latest SukiSU-Ultra Patched Init_Boot]($URL_SUKI)**

          ---
          *Auto-updated by GitHub Actions. Last check: $CURR_DATE*
          EOF

      - name: Update and Commit Tracked Versions & README to Repository
        if: env.ANY_BUILD == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # checkout correct branch explicitly to prevent detached HEAD
          git checkout ${{ github.ref_name }}
          
          # Write new versions back to versions.json
          echo "{\"nothing_tag\":\"${{ env.NEW_NOTHING }}\",\"ksu_version\":\"${{ env.NEW_KSU }}\",\"ksun_version\":\"${{ env.NEW_KSUN }}\",\"sukisu_version\":\"${{ env.NEW_SUKI }}\",\"apatch_version\":\"${{ env.NEW_APA }}\",\"folkpatch_version\":\"${{ env.NEW_FOLK }}\"}" > versions.json
          
          # Stage files before pulling/rebasing to avoid unstaged conflict
          git add versions.json README.md
          git commit -m "Auto-update tracked versions & README [skip ci]" || echo "No changes to commit"
          
          # pull changes before pushing to avoid conflicts
          git pull origin ${{ github.ref_name }} --rebase
          
          # Push to branch
          git push origin ${{ github.ref_name }}
